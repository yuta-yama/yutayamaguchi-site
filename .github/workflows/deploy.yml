# Cloudflare Pages — GitHub Actions deploy

# Required repo secrets (Cloudflare dashboard → My Profile → API Tokens):
#   CLOUDFLARE_API_TOKEN  — Create Token → "Edit Cloudflare Workers" template
#                           (also needs Account.Cloudflare Pages:Edit)
#   CLOUDFLARE_ACCOUNT_ID — right sidebar on any Workers/Pages overview page

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=yutayamaguchi
